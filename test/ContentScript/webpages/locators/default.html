<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      .pointer { cursor: pointer }
      .unique-class { cursor: pointer }
    </style>
    <title>Element Locator Default</title>
  </head>
  <body>
    <div id="by-id" class="pointer">By ID</div>

    <div class="unique-class">By class</div>

    <div class="shared-class"><div class="shared-class" style="cursor: pointer">By css</div></div>

    <div class="pointer">By xpath</div>
  </body>
</html>
